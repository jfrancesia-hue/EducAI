name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: educai_ci
          POSTGRES_USER: educai
          POSTGRES_PASSWORD: educai_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U educai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8

    env:
      DATABASE_URL: postgresql://educai:educai_ci_password@localhost:5432/educai_ci?schema=public
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      SKIP_RLS_SMOKE: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @educai/database db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Apply Supabase migrations (RLS + storage policies)
        run: |
          for sql in supabase/migrations/*.sql; do
            echo "==> $sql"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$sql"
          done

      - name: Create non-superuser role for RLS smoke
        # `educai` (POSTGRES_USER) es superuser y bypassa RLS automaticamente,
        # asi que un smoke corrido con esa URL daria falso verde. Creamos un
        # rol app-level NOBYPASSRLS y lo usamos solo para los tests RLS.
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
            do $$
            begin
              if not exists (select 1 from pg_roles where rolname = 'educai_app') then
                create role educai_app login password 'educai_app_password' nobypassrls nosuperuser;
              end if;
            end $$;
            grant usage on schema public to educai_app;
            grant select, insert, update, delete on all tables in schema public to educai_app;
            grant usage, select on all sequences in schema public to educai_app;
            alter default privileges in schema public grant select, insert, update, delete on tables to educai_app;
            alter default privileges in schema public grant usage, select on sequences to educai_app;
          SQL

      - name: Seed database
        run: pnpm db:seed

      - name: Test
        env:
          DATABASE_URL_APP: postgresql://educai_app:educai_app_password@localhost:5432/educai_ci?schema=public
        run: pnpm test

      - name: Build
        run: pnpm build
