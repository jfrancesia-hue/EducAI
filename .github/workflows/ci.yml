name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: educai_ci
          POSTGRES_USER: educai
          POSTGRES_PASSWORD: educai_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U educai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8

    env:
      DATABASE_URL: postgresql://educai:educai_ci_password@localhost:5432/educai_ci?schema=public
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      OPENAI_API_KEY: test-openai-api-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @educai/database db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
